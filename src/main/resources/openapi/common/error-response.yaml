ErrorApiResponseDto:
  type: object
  required:
    - code
  properties:
    code:
      type: string
      description: Enumerated code of the error, for example RESOURCE_NOT_FOUND, VALIDATION, INTERNAL_SERVER_ERROR
    message:
      type: string
      description: Additional description of the error
    details:
      type: object
      description: Additional data related to the corresponding error-code; for example for VALIDATION error code the 'details' may include some information meaningful to the consumer